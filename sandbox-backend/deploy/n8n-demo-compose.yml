services:
  n8n-demo:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: n8n-demo
    restart: unless-stopped
    ports:
      - "127.0.0.1:5679:5678"
    environment:
      NODE_ENV: production
      TZ: Africa/Casablanca
      GENERIC_TIMEZONE: Africa/Casablanca
      N8N_HOST: vm2.amineessahfi.xyz
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      N8N_PATH: ${WORKFLOW_STUDIO_PATH:-/workflow-studio/}
      N8N_EDITOR_BASE_URL: ${WORKFLOW_STUDIO_URL:-https://vm2.amineessahfi.xyz/workflow-studio/}
      WEBHOOK_URL: ${WORKFLOW_STUDIO_URL:-https://vm2.amineessahfi.xyz/workflow-studio/}
      N8N_PROXY_HOPS: 1
      N8N_BASIC_AUTH_ACTIVE: "true"
      N8N_BASIC_AUTH_USER: ${N8N_DEMO_BASIC_AUTH_USER}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_DEMO_BASIC_AUTH_PASSWORD}
      N8N_SECURE_COOKIE: "true"
      N8N_SAMESITE_COOKIE: "none"
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_TEMPLATES_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      N8N_PUBLIC_API_DISABLED: "true"
      N8N_COMMUNITY_PACKAGES_ENABLED: "false"
      N8N_PYTHON_ENABLED: "false"
      N8N_BLOCK_ENV_ACCESS_IN_NODE: "true"
      N8N_BLOCK_FILE_ACCESS_TO_N8N_FILES: "true"
      N8N_GIT_NODE_DISABLE_BARE_REPOS: "true"
      N8N_GIT_NODE_ENABLE_HOOKS: "false"
      NODES_INCLUDE: '["n8n-nodes-base.manualTrigger","n8n-nodes-base.set","n8n-nodes-base.if","n8n-nodes-base.switch","n8n-nodes-base.merge","n8n-nodes-base.wait"]'
      NODES_EXCLUDE: '["n8n-nodes-base.executeCommand","n8n-nodes-base.localFileTrigger"]'
    volumes:
      - ./data:/home/node/.n8n
